# Default values for web.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

# Enable user namespace support for the pod
# WARNING: This feature requires Kubernetes v1.33+ (or v1.29+ with UserNamespacesSupport feature gate enabled)
# and specific cluster requirements:
#   - Linux kernel 6.3+ on the node
#   - Container runtime with user namespace support (runc v1.2+, crun v1.9+, containerd v2.0+, or CRI-O v1.25+)
#   - Node filesystem must support idmap mounts (btrfs, ext4, xfs, tmpfs, overlayfs)
# If requirements are not met, pods will fail to start with an error.
# When enabled (false), the container's root user is remapped to a non-root user on the host,
# significantly reducing container escape privileges.
# See: https://kubernetes.io/docs/concepts/workloads/pods/user-namespaces/
hostUsers: true

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  enabled: true
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Environment variables to be added to the container
env: []
  # - name: ENV_NAME
  #   value: env_value

# Secret environment variables to be added to the container
envSecrets: []
  # - name: SECRET_ENV_NAME
  #   secretName: my-secret
  #   secretKey: my-secret-key
  # - name: ANOTHER_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
  #       key: my-key

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

livenessProbe:
  enabled: false
  probe:
#   httpGet:
#     path: /
#     port: http

readinessProbe:
  enabled: false
  probe:
#   httpGet:
#     path: /
#     port: http
